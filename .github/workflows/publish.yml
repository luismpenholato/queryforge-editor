name: Publish Extension

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - CHANGELOG.md
      - README.md
      - .vscodeignore
      - "src/**"
      - "images/**"
      - "scripts/**"
      - .github/workflows/ci.yml
      - .github/workflows/publish.yml

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-extension
  cancel-in-progress: false

jobs:
  publish:
    name: Tag, publish and release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          echo "Package version: ${VERSION}"
          echo "Release tag: ${TAG}"

      - name: Validate release version
        run: node scripts/validate-release-version.mjs "${{ steps.package.outputs.tag }}"

      - name: Check if release tag already exists
        id: tag
        shell: bash
        run: |
          git fetch --tags

          if git rev-parse "${{ steps.package.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.package.outputs.tag }} already exists. Skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.package.outputs.tag }} does not exist. Publishing will continue."
          fi

      - name: Stop if version was already released
        if: steps.tag.outputs.exists == 'true'
        run: |
          echo "Version ${{ steps.package.outputs.version }} already has tag ${{ steps.package.outputs.tag }}."
          echo "No publish or release will be created."

      - name: Install dependencies
        if: steps.tag.outputs.exists == 'false'
        run: npm ci

      - name: Typecheck
        if: steps.tag.outputs.exists == 'false'
        run: npm run typecheck

      - name: Test
        if: steps.tag.outputs.exists == 'false'
        run: npm test

      - name: Compile bundle
        if: steps.tag.outputs.exists == 'false'
        run: npm run compile

      - name: List package files
        if: steps.tag.outputs.exists == 'false'
        run: npm run list

      - name: Package VSIX
        if: steps.tag.outputs.exists == 'false'
        id: vsix
        shell: bash
        run: |
          npm run package
          VSIX_FILE="$(ls -1 queryforge-editor-${{ steps.package.outputs.version }}.vsix)"
          echo "file=$VSIX_FILE" >> "$GITHUB_OUTPUT"

      - name: Validate VSIX
        if: steps.tag.outputs.exists == 'false'
        run: node scripts/validate-package.mjs "${{ steps.vsix.outputs.file }}"

      - name: Extract release notes from CHANGELOG
        if: steps.tag.outputs.exists == 'false'
        run: node scripts/extract-changelog.mjs "${{ steps.package.outputs.tag }}" --output release-notes.md

      - name: Validate marketplace tokens
        if: steps.tag.outputs.exists == 'false'
        shell: bash
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT secret is not configured."
            exit 1
          fi

          if [ -z "$OVSX_PAT" ]; then
            echo "OVSX_PAT secret is not configured."
            exit 1
          fi

      - name: Publish to Visual Studio Marketplace
        if: steps.tag.outputs.exists == 'false'
        run: npx vsce publish --packagePath "${{ steps.vsix.outputs.file }}" --pat "$VSCE_PAT"

      - name: Publish to Open VSX
        if: steps.tag.outputs.exists == 'false'
        run: npx ovsx publish "${{ steps.vsix.outputs.file }}" --pat "$OVSX_PAT"

      - name: Create git tag
        if: steps.tag.outputs.exists == 'false'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "${{ steps.package.outputs.tag }}"
          git push origin "${{ steps.package.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.tag }}
          name: QueryForge Editor ${{ steps.package.outputs.tag }}
          body_path: release-notes.md
          files: ${{ steps.vsix.outputs.file }}
